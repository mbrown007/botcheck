[tool.uv.workspace]
members = [
    "packages/botcheck_http_client",
    "packages/observability",
    "packages/scenarios",
    "services/api",
    "services/agent",
    "services/judge",
]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
    "pytest-randomly>=3.16",
    "ruff>=0.11.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["botcheck_http_client", "botcheck_observability", "botcheck_scenarios"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["packages", "services"]
