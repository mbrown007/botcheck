global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: botcheck-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics-scrape-token
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  - job_name: botcheck-judge
    metrics_path: /metrics
    static_configs:
      - targets: ["judge:9101"]
        labels:
          service: judge

  - job_name: botcheck-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["agent:9102"]
        labels:
          service: agent

  # LiveKit emits OTEL metrics; route those through your OTLP -> Prometheus
  # bridge/collector and add its scrape target here when enabled.
  # - job_name: livekit-otel-bridge
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["otel-collector:9464"]
  #       labels:
  #         service: livekit
